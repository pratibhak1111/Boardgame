name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Java CI with Maven"]   # must match EXACT name
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 📥 Download JAR from previous workflow
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: boardgame

      # 🔐 Setup SSH
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 📦 Copy JAR to EC2
      - name: Copy JAR
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa *.jar \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/ubuntu/app/app.jar

      # 🔄 Restart App
      - name: Restart App
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            sudo systemctl restart myapp
            sudo systemctl status myapp --no-pager
          "
